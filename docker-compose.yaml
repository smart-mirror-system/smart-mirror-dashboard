services:
  smart-mirror-mongo:
    image: mongo:7.0
    container_name: mongo
    ports:
      - '27017:27017'
    networks:
      - smart-mirror-net

  smart-mirror-api:
    image: mohamedfouad71/smart-mirror-api:v1.1.0
    ports:
      - '3000:3000'
    env_file:
      - .env-api
    depends_on:
      - smart-mirror-mongo
    networks:
      - smart-mirror-net

  smart-mirror-ai:
    image: mohamedfouad71/smart-mirror-ai:v1.0.0
    env_file:
      - .env-ai
    depends_on:
      - smart-mirror-api
    networks:
      - smart-mirror-net

networks:
  smart-mirror-net:
    driver: bridge
