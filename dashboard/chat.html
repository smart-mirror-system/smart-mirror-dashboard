<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mirror — AI Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="../shared/navbar.css">
</head>
<body>
    <div class="mirror-frame">
        <div class="mirror-inner">
            <div class="scanlines"></div>

            <nav class="sm-navbar" data-context="dashboard" data-dash-root="./" data-setup-root="../setup/"></nav>

            <div class="chat-container panel wa">
                <div class="chat-sidebar">
                    <button id="btnNewChat" class="btn-cyan">+ New Session</button>
                    <div class="chat-list" id="chatList"></div>
                </div>

                <div class="chat-main">
                    <div class="chat-header">
                        <h2 id="currentChatTitle">Select a session</h2>
                        <div class="chat-header-actions">
                            <button id="btnRenameChat" class="btn-icon btn-rename" style="display:none;" title="Rename session">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                                Rename
                            </button>
                            <button id="btnDeleteChat" class="btn-icon btn-danger" style="display:none;" title="Delete session">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                    <path d="M10 11v6M14 11v6"/>
                                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                                </svg>
                                Delete
                            </button>
                        </div>
                    </div>

                    <div class="chat-messages" id="chatMessages"></div>

                    <div class="typing-indicator" id="typingIndicator" style="display: none;">
                        AI is analyzing<span>.</span><span>.</span><span>.</span>
                    </div>

                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Ask your AI coach about your form, diet, or routine..." disabled>
                        <button id="btnSend" class="btn-cyan" disabled>SEND</button>
                    </div>
                </div>
            </div>

            <!-- Rename Modal -->
            <div class="rename-modal" id="renameModal">
                <div class="rename-modal-box">
                    <h3 class="rename-modal-title">Rename Session</h3>
                    <input type="text" id="renameInput" class="rename-modal-input" placeholder="Session name..." maxlength="60">
                    <div class="rename-modal-actions">
                        <button id="btnRenameCancel" class="btn-ghost">Cancel</button>
                        <button id="btnRenameConfirm" class="btn-cyan">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <!-- Markdown renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/env-config.js"></script>
    <script src="js/chat.js"></script>
    <script src="../shared/navbar.js"></script>
</body>
</html>
